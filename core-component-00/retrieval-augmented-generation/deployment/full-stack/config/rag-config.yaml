# RAG System Configuration — Production-Ready
# Hardware: ASUS Zenbook Pro 14 Duo OLED (RTX 4060 8GB + i9-13900H + 32GB RAM)
# Use Case: RAG-augmented coding assistance, sustained workloads

system:
  name: "coding-rag-system"
  environment: "local-development"
  hardware_profile: "asus-zenbook-pro-14-duo"

# LLM Configuration (LM Studio)
llm:
  provider: "lm-studio"
  base_url: "http://localhost:1234/v1"
  model: "Qwen3.6-35B-A3B-Q4_K_M"
  context_length: 16384
  max_tokens: 4096
  temperature: 0.2
  top_p: 0.95
  timeout: 120

# Embedding Configuration
embedding:
  model: "BAAI/bge-small-en-v1.5"
  dimension: 384
  device: "cuda"
  batch_size: 32
  max_length: 512

# Vector Database Configuration (Qdrant)
vector_db:
  provider: "qdrant"
  host: "localhost"
  port: 6333
  collection_name: "coding_knowledge_base"
  distance_metric: "cosine"
  index_type: "hnsw"
  hnsw_config:
    m: 16
    ef_construct: 200
    ef_search: 64
  quantization:
    enabled: true
    type: "scalar"

# Reranking Configuration
reranking:
  enabled: true
  model: "BAAI/bge-reranker-large"
  device: "cpu"
  top_k: 5
  batch_size: 8

# Retrieval Configuration
retrieval:
  top_k: 50
  min_score: 0.5
  hybrid_search:
    enabled: true
    lambda_vector: 0.7
    lambda_text: 0.3

# Chunking Configuration
chunking:
  strategy: "semantic"
  chunk_size: 800
  chunk_overlap: 150
  separators: ["\n\n", "\n", ". ", " "]

# Cache Configuration (Redis)
cache:
  enabled: true
  provider: "redis"
  host: "localhost"
  port: 6379
  ttl: 300
  max_memory: "2gb"
  eviction_policy: "lru"

# Context Engineering (CC-00 Integration)
context_engineering:
  enabled: true
  slots:
    system:
      priority: 1
      max_tokens: 2048
    retrieved:
      priority: 2
      max_tokens: 8192
    history:
      priority: 3
      max_tokens: 4096
    tool_outputs:
      priority: 4
      max_tokens: 2048
  compression:
    enabled: true
    strategy: "hybrid"
    target_ratio: 0.7

# Security Configuration
security:
  access_control:
    enabled: false
    mode: "pre-filter"
  pii_handling:
    enabled: true
    mode: "mask-with-tag"
    sensitive_fields: ["email", "phone", "ssn", "credit_card"]
  audit_logging:
    enabled: true
    storage: "local"
    path: "./logs/audit"
    retention_days: 90

# Monitoring Configuration
monitoring:
  enabled: true
  metrics:
    - "query_latency"
    - "retrieval_accuracy"
    - "cache_hit_rate"
    - "context_utilization"
  prometheus:
    enabled: false
    port: 9090

# Performance Tuning
performance:
  max_concurrent_requests: 3
  request_timeout: 180
  embedding_workers: 4
  reranking_workers: 2
