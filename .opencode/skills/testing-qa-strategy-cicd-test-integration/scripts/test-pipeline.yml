# .github/workflows/test-pipeline.yml
name: Test Pipeline
on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

jobs:
  # Phase 1: Fast feedback — runs first, fails fast
  lint-and-static-analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Run linters
        run: ./scripts/lint.sh
      - name: Run static analysis
        run: ./scripts/static-analysis.sh

  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v4
      - name: Run unit tests (shard ${{ matrix.shard }})
        run: ./scripts/test-unit.sh --shard ${{ matrix.shard }} --total-shards 4
      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results-shard-${{ matrix.shard }}
          path: build/test-results/unit/*.xml

  # Phase 2: Integration tests — only if Phase 1 passes
  integration-tests:
    needs: [lint-and-static-analysis, unit-tests]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Run integration tests
        run: ./scripts/test-integration.sh
        env:
          DATABASE_URL: postgresql://test_user:test_pass@localhost:5432/test_db